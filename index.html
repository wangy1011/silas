<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silas</title>
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #161410;
    --border: #2a2620;
    --text: #c8bfb0;
    --text-dim: #5a5248;
    --accent: #8b7355;
    --accent-light: #c4a882;
    --iris: #6b8a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3a2e24, #1e1a14);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--accent);
    font-style: italic;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 16px;
    font-weight: normal;
    color: var(--accent-light);
    letter-spacing: 0.08em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 1px;
  }

  .setup-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .setup-bar input {
    flex: 1;
    min-width: 110px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: monospace;
    font-size: 11px;
    border-radius: 3px;
    outline: none;
  }

  .setup-bar input:focus { border-color: var(--accent); }
  .setup-bar input::placeholder { color: var(--text-dim); }

  .save-btn {
    background: var(--accent);
    color: #0e0d0b;
    border: none;
    padding: 7px 16px;
    font-family: Georgia, serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .save-btn:hover { background: var(--accent-light); }

  .saved-notice {
    font-size: 11px;
    color: var(--iris);
    font-style: italic;
    display: none;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 9px;
    align-items: flex-start;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-style: italic;
  }

  .message.silas .msg-avatar {
    background: linear-gradient(135deg, #3a2e24, #1e1a14);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .message.user .msg-avatar {
    background: linear-gradient(135deg, #1e2e28, #111e18);
    border: 1px solid #253028;
    color: var(--iris);
  }

  .bubble {
    max-width: 75%;
    padding: 10px 13px;
    font-size: 15px;
    line-height: 1.72;
  }

  .message.silas .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    color: var(--text);
  }

  .message.user .bubble {
    background: #18211f;
    border: 1px solid #253028;
    border-right: 2px solid var(--iris);
    color: #9fb8ae;
  }

  .speaking-dot {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    margin-left: 5px;
    vertical-align: middle;
  }

  .speaking-dot span {
    width: 3px;
    height: 3px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .speaking-dot span:nth-child(2) { animation-delay: 0.2s; }
  .speaking-dot span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  .typing-wrap {
    display: flex;
    gap: 9px;
    align-items: flex-start;
  }

  .typing-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-bubble span {
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
