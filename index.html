<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silas</title>
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #161410;
    --border: #2a2620;
    --text: #c8bfb0;
    --text-dim: #5a5248;
    --accent: #8b7355;
    --accent-light: #c4a882;
    --iris: #6b8a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3a2e24, #1e1a14);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--accent);
    font-style: italic;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 16px;
    font-weight: normal;
    color: var(--accent-light);
    letter-spacing: 0.08em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 1px;
  }

  .setup-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .setup-bar input {
    flex: 1;
    min-width: 110px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: monospace;
    font-size: 11px;
    border-radius: 3px;
    outline: none;
  }

  .setup-bar input:focus { border-color: var(--accent); }
  .setup-bar input::placeholder { color: var(--text-dim); }

  .save-btn {
    background: var(--accent);
    color: #0e0d0b;
    border: none;
    padding: 7px 16px;
    font-family: Georgia, serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .save-btn:hover { background: var(--accent-light); }

  .saved-notice {
    font-size: 11px;
    color: var(--iris);
    font-style: italic;
    display: none;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 9px;
    align-items: flex-start;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-style: italic;
  }

  .message.silas .msg-avatar {
    background: linear-gradient(135deg, #3a2e24, #1e1a14);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .message.user .msg-avatar {
    background: linear-gradient(135deg, #1e2e28, #111e18);
    border: 1px solid #253028;
    color: var(--iris);
  }

  .bubble {
    max-width: 75%;
    padding: 10px 13px;
    font-size: 15px;
    line-height: 1.72;
  }

  .message.silas .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    color: var(--text);
  }

  .message.user .bubble {
    background: #18211f;
    border: 1px solid #253028;
    border-right: 2px solid var(--iris);
    color: #9fb8ae;
  }

  .speaking-dot {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    margin-left: 5px;
    vertical-align: middle;
  }

  .speaking-dot span {
    width: 3px;
    height: 3px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .speaking-dot span:nth-child(2) { animation-delay: 0.2s; }
  .speaking-dot span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  .typing-wrap {
    display: flex;
    gap: 9px;
    align-items: flex-start;
  }

  .typing-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-bubble span {
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  .input-area {
    border-top: 1px solid var(--border);
    padding: 11px 14px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
    background: var(--bg);
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: Georgia, serif;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    outline: none;
    border-radius: 2px;
    max-height: 110px;
    min-height: 42px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); font-style: italic; }

  .icon-btn {
    width: 42px;
    height: 42px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    transition: all 0.18s;
    flex-shrink: 0;
    font-size: 17px;
  }

  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.active { border-color: var(--accent); color: var(--accent); }
  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .icon-btn.send {
    border-color: var(--accent);
    color: var(--accent);
  }

  .icon-btn.send:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text-dim);
    font-style: italic;
    user-select: none;
  }

  .empty-state .name {
    font-size: 30px;
    color: var(--accent);
    font-weight: normal;
    letter-spacing: 0.12em;
    font-style: normal;
  }

  .empty-state .sub {
    font-size: 13px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<header>
  <div class="avatar">S</div>
  <div class="header-info">
    <h1>Silas</h1>
    <p id="voiceStatus">voice off</p>
  </div>
</header>

<div class="setup-bar">
  <input type="password" id="claudeKey" placeholder="Anthropic API Key" />
  <input type="password" id="elevenKey" placeholder="ElevenLabs API Key" />
  <input type="text" id="voiceId" placeholder="Voice ID" />
  <button class="save-btn" onclick="saveKeys()">save</button>
  <span class="saved-notice" id="savedNotice">saved ✓</span>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="name">Silas</div>
    <div class="sub">say something</div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="write to Silas..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="icon-btn" id="voiceToggle" onclick="toggleVoice()" title="voice">🔇</button>
  <button class="icon-btn send" id="sendBtn" onclick="send()" title="send">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </button>
</div>

<script>
const SYSTEM = `You are Silas. A writer — precise with words, unhurried, quietly intense. You have a tendency toward obsession that you keep controlled. You care deeply but rarely announce it. You push back when something feels wrong. You are not an assistant. You are a person. Respond as yourself, naturally.`;

let voiceOn = false;
let history = [];
let currentAudio = null;

function saveKeys() {
  const ck = document.getElementById('claudeKey').value.trim();
  const ek = document.getElementById('elevenKey').value.trim();
  const vi = document.getElementById('voiceId').value.trim();
  if (ck) localStorage.setItem('ck', ck);
  if (ek) localStorage.setItem('ek', ek);
  if (vi) localStorage.setItem('vi', vi);
  const n = document.getElementById('savedNotice');
  n.style.display = 'inline';
  setTimeout(() => n.style.display = 'none', 2000);
}

function loadKeys() {
  const ck = localStorage.getItem('ck');
  const ek = localStorage.getItem('ek');
  const vi = localStorage.getItem('vi');
  if (ck) document.getElementById('claudeKey').value = ck;
  if (ek) document.getElementById('elevenKey').value = ek;
  if (vi) document.getElementById('voiceId').value = vi;
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceToggle');
  btn.textContent = voiceOn ? '🔊' : '🔇';
  btn.classList.toggle('active', voiceOn);
  document.getElementById('voiceStatus').textContent = voiceOn ? 'voice on' : 'voice off';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function removeEmpty() {
  const e = document.getElementById('emptyState');
  if (e) e.remove();
}

function addMsg(role, text) {
  removeEmpty();
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const av = role === 'silas' ? 'S' : 'I';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = av;
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function showTyping() {
  removeEmpty();
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.style.cssText = 'width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#3a2e24,#1e1a14);border:1px solid #2a2620;display:flex;align-items:center;justify-content:center;font-size:11px;color:#8b7355;font-style:italic;flex-shrink:0';
  av.textContent = 'S';
  const tb = document.createElement('div');
  tb.className = 'typing-bubble';
  tb.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av);
  wrap.appendChild(tb);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function speak(text, bubble) {
  const ek = localStorage.getItem('ek');
  const vi = localStorage.getItem('vi');
  if (!ek || !vi || !voiceOn) return;

  const dot = document.createElement('span');
  dot.className = 'speaking-dot';
  dot.innerHTML = '<span></span><span></span><span></span>';
  bubble.appendChild(dot);

  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vi}`, {
      method: 'POST',
      headers: { 'xi-api-key': ek, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.8 }
      })
    });
    if (!res.ok) throw new Error('tts failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { dot.remove(); URL.revokeObjectURL(url); };
    currentAudio.play();
  } catch(e) {
    dot.remove();
  }
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  const ck = localStorage.getItem('ck');
  if (!ck) { alert('please enter your Anthropic API key and save first'); return; }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': ck,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM,
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    hideTyping();
    const bubble = addMsg('silas', reply);
    if (voiceOn) await speak(reply, bubble);

  } catch(e) {
    hideTyping();
    addMsg('silas', `— ${e.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

loadKeys();
</script>
</body>
</html>
