<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400&display=swap');

  :root {
    --bg: #0e0d0b;
    --surface: #161410;
    --border: #2a2620;
    --text: #c8bfb0;
    --text-dim: #5a5248;
    --accent: #8b7355;
    --accent-light: #c4a882;
    --silas: #a89070;
    --iris: #6b8a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', 'Noto Serif SC', serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3a2e24, #1e1a14);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--accent);
    font-style: italic;
  }

  .header-info h1 {
    font-size: 16px;
    font-weight: 400;
    color: var(--accent-light);
    letter-spacing: 0.05em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  .setup-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .setup-bar input {
    flex: 1;
    min-width: 120px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: monospace;
    font-size: 11px;
    border-radius: 4px;
    outline: none;
  }

  .setup-bar input:focus {
    border-color: var(--accent);
  }

  .setup-bar input::placeholder {
    color: var(--text-dim);
  }

  .save-btn {
    background: var(--accent);
    color: #0e0d0b;
    border: none;
    padding: 6px 14px;
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    white-space: nowrap;
  }

  .save-btn:hover { background: var(--accent-light); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-style: italic;
  }

  .message.silas .msg-avatar {
    background: linear-gradient(135deg, #3a2e24, #1e1a14);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .message.user .msg-avatar {
    background: linear-gradient(135deg, #1e2e28, #111e18);
    border: 1px solid var(--border);
    color: var(--iris);
  }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 15px;
    line-height: 1.7;
    position: relative;
  }

  .message.silas .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-left: 2px solid var(--accent);
  }

  .message.user .bubble {
    background: #1a2220;
    border: 1px solid #253028;
    color: #a0b8ae;
    border-right: 2px solid var(--iris);
  }

  .speaking-indicator {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    margin-left: 6px;
    vertical-align: middle;
  }

  .speaking-indicator span {
    width: 3px;
    height: 3px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }

  .speaking-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .speaking-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .typing {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .typing-dots {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dots span {
    width: 4px;
    height: 4px;
    bac
